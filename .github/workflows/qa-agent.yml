name: QA Agent Review

on:
  repository_dispatch:
    types: [analyze_target_repo]
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  qa-review:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Debug payload
        run: |
          echo "target_owner=${{ github.event.client_payload.target_owner }}"
          echo "target_repo=${{ github.event.client_payload.target_repo }}"
          echo "target_ref=${{ github.event.client_payload.target_ref }}"
          echo "target_branch=${{ github.event.client_payload.target_branch }}"
          echo "base_sha=${{ github.event.client_payload.base_sha }}"
          echo "head_sha=${{ github.event.client_payload.head_sha }}"

      - name: Checkout do repo do agente
        uses: actions/checkout@v4
        with:
          path: agent
          fetch-depth: 0

      - name: Checkout do repo alvo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.target_owner }}/${{ github.event.client_payload.target_repo }}
          ref: ${{ github.event.client_payload.target_ref }}
          path: target
          fetch-depth: 0
          token: ${{ secrets.TARGET_REPO_PAT }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do agente
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt

      - name: Criar arquivo .env do agente
        run: |
          echo "LLM_PROVIDER=groq" >> agent/.env
          echo "LLM_MODEL=groq/llama-3.3-70b-versatile" >> agent/.env
          echo "LLM_API_KEY=${{ secrets.GROQ_API_KEY }}" >> agent/.env
          echo "LLM_TEMPERATURE=0" >> agent/.env

      - name: Executar QAgent contra o repo alvo
        run: |
          cd agent
          python -m src.main \
            --repo-path ../target \
            --output-file ../target/outputs/analysis.md \
            --base-sha "${{ github.event.client_payload.base_sha }}" \
            --head-sha "${{ github.event.client_payload.head_sha }}"

      - name: Mostrar relatório gerado
        run: |
          cat target/outputs/analysis.md || true

      - name: Publicar relatório como artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-analysis
          path: target/outputs/analysis.md
          retention-days: 7

      - name: Baixar histórico atual da branch gh-pages
        run: |
          mkdir -p previous-pages
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add previous-pages gh-pages
          fi
        working-directory: agent

      - name: Montar site com histórico
        run: |
          python scripts/build_pages_site.py --analysis-file ../target/outputs/analysis.md
        working-directory: agent

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do site para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: agent/site

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4