name: Ingest PR comment to memories

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read

jobs:
  ingest-comment:
    if: ${{ github.event.issue.pull_request != null && (contains(github.event.comment.body, 'Copilot') || contains(github.event.comment.body, 'copilot')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingest script
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python .github/scripts/ingest_comment.py
